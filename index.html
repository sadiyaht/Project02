<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Shop</title>

    <link rel="stylesheet" href="./style.css">

    <link href="https://www.google.com/maps/place/Tony's+Palace+Pizza/@40.0274835,-75.1501085,17z/data=!3m2!4b1!5s0x89c6b785f584cc51:0x41297717cdc23c0e!4m16!1m9!4m8!1m0!1m6!1m2!1s0x89c6b785f5fb2585:0xe85d26e79247cc56!2sTony's+Palace+Pizza,+4860+N+Broad+St,+Philadelphia,+PA+19141!2m2!1d-75.1475336!2d40.0274794!3m5!1s0x89c6b785f5fb2585:0xe85d26e79247cc56!8m2!3d40.0274794!4d-75.1475336!16s%2Fg%2F1tgd7h0_?entry=ttu&g_ep=EgoyMDI2MDQyMC4wIKXMDSoASAFQAw%3D%3D" rel="stylesheet">
</head>

<body>

<div class="grid">

    <section class="info">
        <h1>Tony Pizza Palace</h1>

        <h2>Business Info</h2>
        <p>Address: 4860 N Broad Street, Philadelphia PA</p>
        <p>Phone: (215) 455-5610</p>
    </section>

    <section class="menu">
        <h2>Menu</h2>

        <p>Cheese - $7.99</p>
        <p>Pepperoni - $12.99</p>
        <p>Veggie - $13.99</p>

        <p>Toppings: pepperoni, mushrooms, onions, peppers, olives</p>

        <h3>Photos</h3>

        <div class="pics">
            <img src="cheese pizza.png" alt="pizza">
            <img src="pepperoni pizza.png" alt="pizza">
            <img src="veggie pizza.png" alt="pizza">
        </div>
    </section>

    <section class="order">
        <h2>Order</h2>

        <form>
            <label>Name</label>
            <input type="text" required>

            <label>Phone</label>
            <input type="tel" required>

            <label>Address</label>
            <input type="text" required>

            <label>Pizza</label>
            <select>
                <option>Cheese</option>
                <option>Pepperoni</option>
                <option>Veggie</option>
            </select>

            <button type="submit">Submit</button>
        </form>
    </section>

    <footer>
        <p>Project for class</p>
        <a href="https://github.com/sadiyaht">GitHub</a>
    </footer>

</div>

</body>
</html>
