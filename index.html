<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Shop</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="grid">

    <section class="info">
        <h1>Tony's Palace Pizza</h1>

        <h2>Business Info</h2>
        <p>Address: 4860 N Broad Street, Philadelphia PA</p>
        <p>Phone: (215) 455-5610</p>

        <p>
            <a href="https://www.google.com/maps/place/Tony's+Palace+Pizza/" target="_blank">
                View on Google Maps
            </a>
        </p>
    </section>

    <section class="menu">
        <h2>Menu</h2>

        <p>Cheese - $7.99</p>
        <p>Pepperoni - $12.99</p>
        <p>Veggie - $13.99</p>

        <p>Toppings: pepperoni, mushrooms, onions, peppers, olives</p>

        <h3>Photos</h3>

        <div class="pics">
            <img src="cheese pizza.png" alt="cheese pizza">
            <img src="pepperoni pizza.png" alt="pepperoni pizza">
            <img src="veggie pizza.png" alt="veggie pizza">
        </div>
    </section>

    <section class="order">
        <h2>Order</h2>

        <form>
            <label>Name</label>
            <input type="text" required>

            <label>Phone</label>
            <input type="tel" required>

            <label>Address</label>
            <input type="text" required>

            <label>Pizza</label>
            <select>
                <option>Cheese</option>
                <option>Pepperoni</option>
                <option>Veggie</option>
            </select>

            <button type="submit">Submit</button>
        </form>
    </section>

    <footer>
        <p>Project for class</p>
        <a href="https://github.com/sadiyaht">GitHub</a>
    </footer>

</div>

</body>
</html>
